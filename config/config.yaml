# İHA / UAV havadan gözlem & davranış analizi — ana yapılandırma (UTF-8)
# v2.0 — Aerial: bölgeler WGS84 + GMC warp; eğitim verisi (UCF vb.) sabit kamera
#   olabilir; sunumda: özellik çıkarımı aynı, tehdit kuralları UAV için uyarlanır.

# ─── Detector ─────────────────────────────────────────────
detector:
  model: "yolov8s.pt"          # yolov8n / yolov8s / yolov8m
  confidence: 0.65
  iou_threshold: 0.45
  device: "cpu"                 # "cpu" veya "cuda"
  classes: [0, 1, 2, 3, 5, 7, 24, 26, 28]  # person, vehicles, backpack, handbag, suitcase
  imgsz: 640

# ─── Tracker ──────────────────────────────────────────────
tracker:
  type: "bytetrack"            # "bytetrack" veya "deepsort"
  bytetrack:
    track_thresh: 0.5
    track_buffer: 20
    match_thresh: 0.8
    frame_rate: 15
    min_hits: 3                 # En az bu kadar ardışık eşleşme olmadan track gösterilmez
  deepsort:
    max_dist: 0.2
    max_age: 30
    n_init: 3
    nn_budget: 100

  # Ego-Motion / Global Motion Compensation (Drone & IHA modu)
  # Sabit kamera icin enabled: false birakin — ekstra CPU yuku olmaz.
  ego_motion:
    enabled: true              # Drone/IHA: true, sabit kamera: false
    downscale: 0.5             # Jetson icin 0.5 onerilir (2-3x hizlanma)
    max_features: 500          # Daha az = daha hizli; daha fazla = daha stabil
    grid: [4, 4]               # Feature'lari homojen dagitmak icin grid
    ransac_thresh: 3.0         # RANSAC piksel reprojection esigi

# ─── Davranis Motoru ──────────────────────────────────────
behavior:
  zones_file: "config/zones.json"
  # Zone GPS: `zones.json` icinde `georeference` + bolum `points_latlon` (WGS84)
  # istege bagli. Yoksa sadece `points` (piksel, ref cozunurluk) kullanilir.

  loitering:
    threshold_seconds: 60      # Kac saniyeden fazla bekleme anormal
    min_displacement: 50       # Piksel: bu altinda hareket "duruyor" sayilir

  abandoned_object:
    # Kalabalik UAV: 1. en yakin kisi her zaman <200px kaldi; k. en yakin + esik birlikte kullanilir.
    nearest_person_rank: 8     # k=1: klasik (en yakin); havadan kalabalik sahnede 4-12 deneyin
    owner_distance: 90         # k. en yakin kisi bu pikselden uzaksa "terk" adayi
    confirm_seconds: 10        # Kac saniye sonra alarm verilir
    stationary_threshold_px: 28   # Bbox titremesine tolerans (onceki sabit 20px)

  threat_scorer:
    weights:
      zone_violation: 0.35
      loitering: 0.25
      abandoned_object: 0.30
      velocity_anomaly: 0.10

# ─── MLP Siniflandirici ───────────────────────────────────
mlp:
  input_dim: 8
  hidden_dims: [32, 16]
  output_dim: 4               # LOW / MEDIUM / HIGH / CRITICAL
  model_path: "models/weights/threat_mlp.pt"
  threshold_train: 200        # Sentetik ornek sayisi

# ─── Dashboard ────────────────────────────────────────────
dashboard:
  title: "Aerial Surveillance"
  port: 8501
  frame_width: 960
  frame_height: 540
  max_alerts: 50
  fps_display: true
  aerial_view: true              # Kuş bakışı: daha ince bbox + AERIAL VIEW etiketi
  aerial_bbox_scale: 0.7         # Corner bracket ve etiket olcegi (0-1)
  replay_mode: true
  scenarios_dir: "data/scenarios"

# ─── Video ────────────────────────────────────────────────
video:
  source: 0                    # 0 = webcam, veya dosya yolu
  test_video: "data/test_videos/test.mp4"
  output_dir: "data/output"
  record: false

# ─── Loglama ──────────────────────────────────────────────
logging:
  level: "DEBUG"                # DEBUG / INFO / WARNING
  save_alerts: true
  alerts_file: "data/output/alerts.json"
